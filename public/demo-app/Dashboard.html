<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frontlix Dashboard — Schoon Straatje</title>
<link rel="icon" type="image/png" href="assets/frontlix-logo.png" />
<link rel="stylesheet" href="src/styles.css" />
</head>
<body class="density-cozy">
  <div id="root"></div>

  <!-- React + Babel: lokaal gebundeld (geen CDN, geen adblocker/netwerk-risico) -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="vendor/babel.min.js"></script>

  <!-- Data + shared components first (they attach to window) -->
  <script type="text/babel" data-presets="env,react" src="src/data.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/components.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/components/modals.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/components/RouteMap.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/components/ManualQuote.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/components/Exports.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/components/EmptyStates.jsx"></script>

  <!-- Starter components -->
  <script type="text/babel" data-presets="env,react" src="lib/ios-frame.jsx"></script>

  <!-- Screens -->
  <script type="text/babel" data-presets="env,react" src="src/screens/Overzicht.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/Leads.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/LeadDetail.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/Agenda.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/Mobile.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/Inbox.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/Reviews.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/Onboarding.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/screens/Auth.jsx"></script>

  <!-- App root (mounts) -->
  <script type="text/babel" data-presets="env,react" src="src/app.jsx"></script>
</body>
</html>
